<!doctype html>
<html lang="en">
    <head>
        <title>MiroTalk WebRTC Live Broadcast</title>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="apple-touch-icon" href="../assets/images/favicon.png" />
        <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico" />

        <meta property="og:type" content="app-webrtc-broadcasting" />
        <meta property="og:site_name" content="MiroTalk BRO Broadcast" />
        <meta property="og:title" content="Click the link to make a call." />
        <meta property="og:description" content="MiroTalk WebRTC Live Broadcast" />
        <meta property="og:image" content="https://bro.mirotalk.com/assets/images/ui.png" />
        <meta property="og:url" content="https://bro.mirotalk.com" />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="../css/common.css" />
        <link rel="stylesheet" href="../css/broadcast.css" />
        <style>
            :root {
                --bg:       #020617;
                --surface:  #0f172a;
                --surface2: #1e293b;
                --border:   rgba(255,255,255,0.07);
                --accent:   #3b82f6;
                --danger:   #ef4444;
                --text:     #f1f5f9;
                --muted:    #64748b;
                --chat-w:   340px;
            }

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            html, body {
                height: 100%;
                overflow: hidden;
                background: var(--bg);
                color: var(--text);
                font-family: 'Inter', system-ui, sans-serif;
            }

            /* ── Grille racine ──────────────────────────────
               Chat ouvert  : video | chat (340px)
               .chat-closed : video seule (0px)
            ─────────────────────────────────────────────── */
            #broadcastForm {
                display: grid !important;
                grid-template-columns: 1fr var(--chat-w);
                grid-template-rows: 1fr;
                grid-template-areas: "video chat";
                width: 100vw;
                height: 100dvh;
                min-height: 200px;
                background: var(--bg);
                transition: grid-template-columns .25s ease;
            }

            #broadcastForm.chat-closed {
                grid-template-columns: 1fr 0px;
            }

            /* ── Container vidéo ────────────────────────── */
            #broadcastForm .container {
                grid-area: video;
                position: relative;
                background: #000;
                overflow: hidden;
                min-height: 0;
            }

            #broadcastForm .container video {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .video-off {
                position: absolute; width: 72px; opacity: .25;
                left: 50%; top: 50%; transform: translate(-50%,-50%);
                z-index: 2;
            }

            #awaitingBroadcaster {
                position: absolute; inset: 0;
                display: flex; align-items: center; justify-content: center;
                color: var(--muted); font-size: 14px; font-weight: 600;
                background: rgba(0,0,0,.55);
                letter-spacing: .02em;
                z-index: 2;
            }

            #reconnectingOverlay {
                position: absolute; inset: 0;
                background: rgba(0,0,0,.75);
                display: none; flex-direction: column;
                align-items: center; justify-content: center;
                gap: 12px; color: var(--text); font-size: 13px;
                z-index: 10;
            }
            #reconnectingOverlay .spinner {
                width: 32px; height: 32px;
                border: 3px solid rgba(255,255,255,.15);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin .7s linear infinite;
            }
            @keyframes spin { to { transform: rotate(360deg) } }

            #recordingLabel {
                position: absolute; top: 62px; right: 12px;
                display: none; align-items: center; gap: 5px;
                background: rgba(239,68,68,.15);
                border: 1px solid rgba(239,68,68,.35);
                color: var(--danger); font-size: 11px; font-weight: 700;
                padding: 3px 10px; border-radius: 20px; pointer-events: none;
                z-index: 6;
            }
            #recordingLabel.pulse { display: flex; }
            #recordingLabel.pulse::before {
                content: ''; width: 6px; height: 6px;
                border-radius: 50%; background: var(--danger);
                animation: livePulse 1s infinite;
            }

            /* ── Header — overlay haut ──────────────────── */
            #broadcastFormHeader {
                position: absolute;
                top: 0; left: 0; right: 0;
                z-index: 5;
                display: flex !important;
                align-items: center;
                justify-content: space-between;
                padding: 0 16px;
                height: 52px;
                background: linear-gradient(to bottom, rgba(2,6,23,.85) 0%, transparent 100%);
            }

            .viewer-info {
                display: flex; align-items: center;
                gap: 8px; font-size: 13px;
                color: var(--muted); flex-wrap: wrap;
            }

            .live-badge {
                display: inline-flex !important;
                align-items: center; gap: 5px;
                background: var(--danger) !important;
                color: #fff !important;
                font-size: 10px; font-weight: 800; letter-spacing: .08em;
                padding: 3px 10px; border-radius: 20px;
                box-shadow: 0 0 10px rgba(239,68,68,.35);
            }
            .live-badge::before {
                content: ''; width: 6px; height: 6px;
                border-radius: 50%; background: #fff;
                animation: livePulse 1.5s infinite;
            }
            @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.3} }

            .viewer-info .info-chip {
                display: inline-flex; align-items: center; gap: 5px;
                background: rgba(15,23,42,.7);
                border: 1px solid var(--border);
                padding: 3px 10px; border-radius: 20px;
                font-size: 12px; color: var(--text);
                backdrop-filter: blur(4px);
            }
            .viewer-info .info-chip i { color: var(--muted); font-size: 11px; }

            .viewer-header-buttons { display: flex; gap: 6px; }

            .viewer-header-buttons button,
            #leave {
                width: 32px !important; height: 32px !important;
                border-radius: 8px !important;
                background: rgba(239,68,68,.2) !important;
                border: 1px solid rgba(239,68,68,.35) !important;
                color: var(--danger) !important;
                cursor: pointer; font-size: 13px;
                display: flex; align-items: center; justify-content: center;
                transition: background .15s;
                backdrop-filter: blur(4px);
            }
            #leave:hover,
            .viewer-header-buttons button:hover { background: rgba(239,68,68,.35) !important; }

            /* ── Toolbar — overlay bas ──────────────────── */
            #broadcastButtons {
                position: absolute;
                bottom: 0; left: 0; right: 0;
                z-index: 5;
                display: flex !important;
                align-items: center; justify-content: center;
                flex-wrap: nowrap; gap: 6px;
                padding: 0 16px; height: 64px;
                background: linear-gradient(to top, rgba(2,6,23,.85) 0%, transparent 100%);
                overflow-x: auto; scrollbar-width: none;
            }
            #broadcastButtons::-webkit-scrollbar { display: none; }

            #broadcastButtons button {
                width: 42px !important; height: 42px !important;
                border-radius: 12px !important;
                background: rgba(15,23,42,.7) !important;
                border: 1px solid rgba(255,255,255,.12) !important;
                color: var(--muted) !important;
                font-size: 15px; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                transition: all .15s; position: relative;
                backdrop-filter: blur(6px);
            }
            #broadcastButtons button:hover {
                background: rgba(255,255,255,.15) !important;
                border-color: rgba(255,255,255,.25) !important;
                color: var(--text) !important;
                transform: translateY(-1px);
            }
            #broadcastButtons button:active { transform: scale(.92); }

            #broadcastButtons #disableAudio,
            #broadcastButtons .btn_video_actif {
                background: rgba(59,130,246,.25) !important;
                border-color: rgba(59,130,246,.4) !important;
                color: var(--accent) !important;
            }
            #broadcastButtons #enableAudio,
            #broadcastButtons #recordingStop {
                background: rgba(239,68,68,.2) !important;
                border-color: rgba(239,68,68,.35) !important;
                color: #f87171 !important;
            }
            #broadcastButtons #enableAudio:hover,
            #broadcastButtons #recordingStop:hover {
                background: rgba(239,68,68,.32) !important;
                color: var(--danger) !important;
            }

            /* bouton chat actif (chat visible) */
            #messagesBtn.chat-open {
                background: rgba(59,130,246,.25) !important;
                border-color: rgba(59,130,246,.4) !important;
                color: var(--accent) !important;
            }

            #broadcastButtons button[title]:hover::after {
                content: attr(title);
                position: absolute;
                bottom: calc(100% + 8px);
                left: 50%; transform: translateX(-50%);
                background: #1e2433;
                color: var(--text); font-size: 11px; font-weight: 500;
                padding: 4px 9px; border-radius: 7px;
                white-space: nowrap; border: 1px solid var(--border);
                z-index: 99; pointer-events: none;
                box-shadow: 0 4px 12px rgba(0,0,0,.4);
            }

            #broadcastButtons button i {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100%;
            }

            /* ── Panel chat (#messagesForm) ─────────────────
               grid-area: chat
               Masqué (largeur 0) quand .chat-closed
            ─────────────────────────────────────────────── */
           

            #broadcastForm.chat-closed #messagesForm {
                opacity: 0;
                pointer-events: none;
            }

            /* header du panel */
            .messages-header {
                display: flex !important;
                align-items: center !important;
                justify-content: space-between !important;
                padding: 0 14px !important;
                height: 52px !important;
                border-bottom: 1px solid var(--border) !important;
                flex-shrink: 0;
                background: var(--surface);
            }
            .messages-info label {
                font-size: 13px; font-weight: 700;
                color: var(--text) !important;
                display: flex; align-items: center; gap: 7px;
            }
            .messages-info label i { color: var(--accent); }

            .messages-buttons { display: flex; gap: 6px; }
            .messages-buttons button,
            #messagesForm .panel-close-btn {
                width: 30px !important; height: 30px !important;
                border-radius: 8px !important;
                background: var(--surface2) !important;
                border: 1px solid var(--border) !important;
                color: var(--muted) !important;
                font-size: 12px; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                transition: all .15s;
            }
            .messages-buttons button:hover { color: var(--text) !important; }
            #messagesForm .panel-close-btn:hover {
                color: var(--danger) !important;
                border-color: rgba(239,68,68,.3) !important;
                background: rgba(239,68,68,.08) !important;
            }

            /* zone messages */
            #viewerMessagesArea {
                flex: 1; overflow-y: auto;
                padding: 12px 14px;
                display: flex; flex-direction: column; gap: 10px;
                scroll-behavior: smooth;
                background: var(--bg);
            }
            #viewerMessagesArea::-webkit-scrollbar { width: 4px; }
            #viewerMessagesArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
            #viewerMessagesArea > * {
                background: rgba(59,130,246,.06) !important;
                border: 1px solid var(--border) !important;
                border-radius: 10px !important;
                padding: 8px 12px !important;
                font-size: 13px !important;
                color: var(--text) !important;
                word-break: break-word;
            }

            /* compose */
            .messages-compose {
                display: flex; align-items: center; gap: 8px;
                padding: 10px 12px;
                border-top: 1px solid var(--border); flex-shrink: 0;
                background: var(--surface);
            }
            #messageInput {
                flex: 1;
                background: var(--surface2) !important;
                border: 1px solid var(--border) !important;
                border-radius: 10px !important;
                color: var(--text) !important;
                font-family: inherit; font-size: 13px;
                padding: 8px 12px; outline: none;
                transition: border-color .15s;
            }
            #messageInput::placeholder { color: var(--muted); }
            #messageInput:focus { border-color: var(--accent) !important; }
            #messageSend {
                width: 34px !important; height: 34px !important;
                border-radius: 9px !important;
                background: var(--accent) !important;
                border: none !important; color: #fff !important;
                font-size: 13px; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0; transition: background .15s;
            }
            #messageSend:hover { background: #2563eb !important; }

            .tab-badge {
                margin-left: 5px;
                font-size: 10px; font-weight: 700; padding: 1px 6px;
                border-radius: 20px; background: var(--surface2); color: var(--muted);
                min-width: 20px; text-align: center; transition: all .15s;
            }
            .sidebar-tab.active .tab-badge { background: rgba(59,130,246,.2); color: var(--accent); }


            /* ── Mobile ─────────────────────────────────── */
            @media (max-width: 768px) {
                #broadcastForm {
                    grid-template-columns: 1fr;
                    grid-template-rows: 1fr 300px;
                    grid-template-areas:
                        "video"
                        "chat";
                    transition: grid-template-rows .25s ease;
                }
                #broadcastForm.chat-closed {
                    grid-template-columns: 1fr;
                    grid-template-rows: 1fr 0px;
                }
                #messagesForm {
                    border-left: none !important;
                    border-top: 1px solid var(--border) !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="broadcastForm" class="broadcast fadeIn">
            
            <div class="container video-loading">
                <div id="broadcastFormHeader" class="broadcast-header not-selectable">
                    <div class="broadcast-info">
                        <span class="live-badge">LIVE</span>
                        <div id="broadcastingModeLabel" class="broadcasting-mode-badge">
                            <span class="mode-dot"></span>
                            <span class="mode-text">---</span>
                        </div>
                        <i class="fas fa-user"></i> <span id="myName">Broadcaster</span> <i class="fas fa-eye"></i
                        ><span id="connectedPeers">0</span> <i class="fas fa-clock"></i> <span id="sessionTime">0s</span>
                    </div>
                    <div class="broadcast-header-buttons">
                        <button id="goHome"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <video class="not-selectable"></video>
                <img id="videoOff" class="video-off" src="../assets/images/videoOff.png" />
                <div id="reconnectingOverlay" class="reconnecting-overlay">
                    <div class="spinner"></div>
                    <span>Reconnecting...</span>
                </div>

                <label id="recordingLabel" class="pulse">🔴 REC: <span id="recordingTime">0S</span></label>
                <div id="broadcastButtons" class="broadcast-buttons">
                    <button id="copyRoom"><i class="fas fa-copy"></i></button>
                    <button id="shareRoom"><i class="fas fa-share-alt"></i></button>
                    <button id="disableAudio"><i class="fas fa-microphone"></i></button>
                    <button id="enableAudio" class="color-red"><i class="fas fa-microphone"></i></button>
                    <button id="videoBtn"><i class="fas fa-video"></i></button>
                    <button id="screenShareStart"><i class="fas fa-display"></i></button>
                    <button id="screenShareStop" class="pulse-bg"><i class="fa-solid fa-circle-stop"></i></button>
                    <button id="recordingStart"><i class="fas fa-record-vinyl"></i></button>
                    <button id="recordingStop" class="color-red"><i class="fas fa-record-vinyl"></i></button>
                    <button id="togglePIP"><i class="fas fa-images"></i></button>
                    <button id="fullScreenOn"><i class="fas fa-expand-alt"></i></button>
                    <button id="fullScreenOff"><i class="fas fa-compress-alt"></i></button>
                    <button id="messagesOpenForm"><i class="fas fa-message"></i></button>
                    <button id="viewersOpenForm"><i class="fas fa-eye"></i></button>
                    <button id="settingsBtn"><i class="fa-solid fa-sliders"></i></button>
                </div>

            </div>
            
            <div id="broadcasterSettingsForm" class="settings panel-drawer fadeIn">
                <div class="settings-panel-header">
                    <div class="settings-title">
                        <i class="fa-solid fa-sliders"></i>
                        <span>Settings</span>
                    </div>
                    <button id="toggleSettingsBtn" class="panel-close-btn"><i class="fas fa-times"></i></button>
                </div>
                <div class="settings-section">
                    <label class="settings-label not-selectable"><i class="fas fa-video"></i> Video source</label>
                    <select id="videoSelect"></select>
                </div>
                <div class="settings-section">
                    <label class="settings-label not-selectable"><i class="fas fa-photo-film"></i> Quality & FPS</label>
                    <div class="broadcast-quality-fps">
                        <select id="videoQualitySelect">
                            <option value="default">Default</option>
                            <option value="qvga">QVGA</option>
                            <option value="vga">VGA</option>
                            <option value="hd">HD</option>
                            <option value="fhd">FULL HD</option>
                            <option value="2k">2K</option>
                            <option value="4k">4K</option>
                            <option value="6k">6K</option>
                            <option value="8k">8K</option>
                        </select>
                        <select id="videoFpsSelect">
                            <option value="default">Default</option>
                            <option value="60">60 fps</option>
                            <option value="30">30 fps</option>
                            <option value="25">25 fps</option>
                            <option value="20">20 fps</option>
                            <option value="15">15 fps</option>
                            <option value="10">10 fps</option>
                            <option value="5">5 fps</option>
                        </select>
                    </div>
                </div>
                <div class="settings-section">
                    <label class="settings-label not-selectable"><i class="fas fa-microphone"></i> Audio source</label>
                    <select id="audioSelect"></select>
                </div>
            </div>
            <div id="messagesForm" class="messages panel-drawer fadeIn">
                <div id="messagesFormHeader" class="messages-header">
                    <div class="messages-info">
                        <label class="not-selectable"><i class="fas fa-message"></i> Messages</label>
                    </div>
                    <div class="messages-buttons">
                        <button id="messagesClean" title="Clear all"><i class="fas fa-trash"></i></button>
                        <button id="messagesSave" title="Save"><i class="fas fa-save"></i></button>
                        <button id="messagesOpenViewersForm" title="Viewers"><i class="fas fa-eye"></i></button>
                        <button id="messagesCloseForm" class="panel-close-btn" title="Close">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div id="messagesArea" class="messages-incoming"></div>
                <div class="messages-compose">
                    <input id="messageInput" maxlength="1024" name="message" placeholder="Type message..." />
                    <button id="messageSend" title="Send"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            <div id="viewersForm" class="viewers panel-drawer fadeIn">
                <div id="viewersHeader" class="viewers-header">
                    <div class="viewers-title-row">
                        <div class="viewers-info">
                            <label class="not-selectable"><i class="fas fa-eye"></i> Viewers</label>
                        </div>
                        <button id="viewersCloseForm" class="panel-close-btn" title="Close">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <input id="viewerSearch" type="text" placeholder=" 🔍 Search viewer..." name="search" />
                    <div class="viewers-toolbar">
                        <div class="viewers-buttons">
                            <button id="viewerOpenMessageForm" title="Messages"><i class="fas fa-message"></i></button>
                            <button id="viewersSave" title="Save list"><i class="fas fa-save"></i></button>
                        </div>
                        <div class="viewers-buttons viewers-buttons-danger">
                            <button id="viewersMuteAudio" title="Mute all"><i class="fas fa-microphone"></i></button>
                            <button id="viewersHideVideo" title="Hide all video"><i class="fas fa-video"></i></button>
                            <button id="viewersDisconnect" title="Disconnect all"><i class="fas fa-plug"></i></button>
                        </div>
                    </div>
                </div>
                <div class="viewers-area">
                    <div id="viewersTable" class="viewers-grid"></div>
                </div>
            </div>
        </div>
        <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.8"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
        <script defer src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"></script>
        <script defer src="https://cdnjs.cloudflare.com/ajax/libs/tippy.js/6.3.7/tippy-bundle.umd.min.js"></script>
        <script defer src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/1.0.37/ua-parser.min.js"></script>
        <script defer src="/socket.io/socket.io.js"></script>
        <script defer src="../js/mediasoup-client.js"></script>
        <script defer src="../js/swal.js"></script>
        <script defer src="../js/utils.js"></script>
        <script defer src="../js/utils.js"></script>
        <script defer src="../js/config.js"></script>
        <script defer src="../js/broadcast.js"></script>
        <script defer src="../js/recording.js"></script>
        <script defer src="../js/ux.js"></script>
        <script async src="../js/stats.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {

            const form     = document.getElementById('broadcastForm')
            const msgBtn   = document.getElementById('messagesBtn')
            const closeBtn = document.getElementById('messagesCloseBtn')

            const chatCount = document.getElementById('chatCount')
            const realArea  = document.getElementById('viewerMessagesArea') // MiroTalk

            const updateCount = () => {
                const msgs = realArea ? realArea.children.length : 0
                chatCount.textContent = msgs
            }

            // Initial
            updateCount()

            const openChat = () => {
                form.classList.remove('chat-closed')
                msgBtn.classList.add('chat-open')
            }
            const closeChat = () => {
                form.classList.add('chat-closed')
                msgBtn.classList.remove('chat-open')
            }

            /* toggle depuis la toolbar */
            msgBtn.addEventListener('click', () => {
                form.classList.contains('chat-closed') ? openChat() : closeChat()
            })

            /* fermeture depuis le ✕ du panel */
            if (closeBtn) closeBtn.addEventListener('click', closeChat)

            /* état initial : chat ouvert */
            openChat()

            // Observer les changements
            if (realArea) {
                new MutationObserver(updateCount)
                    .observe(realArea, { childList: true, subtree: true })
            }

        })
        </script>
    </body>
</html>
