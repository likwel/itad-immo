<!doctype html>
<html lang="fr">
    <head>
        <title>Live interrompu</title>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="apple-touch-icon" href="../assets/images/favicon.png" />
        <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                min-height: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0a0c10;
                font-family: system-ui, sans-serif;
                color: #f1f5f9;
            }

            .card {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 24px;
                padding: 40px 48px;
                background: #12151c;
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 20px;
                text-align: center;
                min-width: 280px;
            }

            .live-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: #ef4444;
                color: #fff;
                font-size: 11px;
                font-weight: 800;
                letter-spacing: 0.08em;
                padding: 4px 12px;
                border-radius: 20px;
            }
            .live-badge::before {
                content: '';
                width: 6px; height: 6px;
                background: #fff;
                border-radius: 50%;
                animation: pulse 1.5s ease-in-out infinite;
            }
            @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

            .title    { font-size: 16px; font-weight: 600; color: #f1f5f9; }
            .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }

            .btn-reconnect {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 11px 28px;
                border-radius: 10px;
                background: #3b82f6;
                color: #fff;
                font-size: 14px;
                font-weight: 600;
                border: none;
                cursor: pointer;
                transition: background .15s, transform .1s;
            }
            .btn-reconnect:hover    { background: #2563eb; }
            .btn-reconnect:active   { transform: scale(.96); }
            .btn-reconnect:disabled { opacity: .6; cursor: not-allowed; }

            .spinner {
                width: 16px; height: 16px;
                border: 2px solid rgba(255,255,255,0.3);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin .7s linear infinite;
                display: inline-block;
            }
            @keyframes spin { to { transform: rotate(360deg); } }

            .error-icon { font-size: 36px; }
            .error-text { font-size: 14px; color: #f87171; font-weight: 500; }
            code {
                background: rgba(255,255,255,0.07);
                padding: 1px 6px;
                border-radius: 4px;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <div class="card" id="card">
            <div class="live-badge">LIVE</div>
            <div>
                <div class="title"    id="title">Live interrompu</div>
                <div class="subtitle" id="subtitle">Cliquez pour rejoindre à nouveau</div>
            </div>
            <button class="btn-reconnect" id="btnReconnect">
                <i class="fas fa-rotate-right"></i> Reconnecter
            </button>
        </div>

        <script>
            (function () {
                const $card = document.getElementById('card')
                const $btn  = document.getElementById('btnReconnect')

                // id et name transmis par goToHomePage() → openURL('/?id=...&name=...&type=...')
                const params = new URLSearchParams(window.location.search)
                const id     = params.get('id')
                const name   = params.get('name') || 'Invité'
                const type   = params.get('type') === 'viewer' ? 'viewer' : 'broadcast'

                if (!id) {
                    $card.innerHTML = `
                        <div class="error-icon">⚠️</div>
                        <div class="error-text">Paramètre <code>id</code> manquant.</div>
                        <div class="subtitle" style="margin-top:8px">
                            Attendu&nbsp;: <code>/?id=abc123&amp;name=MonNom&amp;type=broadcast</code>
                        </div>
                    `
                    return
                }

                const dest = `/${type}?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}`

                $btn.addEventListener('click', () => {
                    $btn.disabled   = true
                    $btn.innerHTML  = `<span class="spinner"></span> Connexion…`
                    window.location.href = dest
                })
            })()
        </script>
    </body>
</html>
